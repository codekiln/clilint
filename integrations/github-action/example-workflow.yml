# Example consumer workflow.
#
# Copy this file into your repository at .github/workflows/clilint.yml and edit
# the `check` line to point at your own CLI executable. This workflow checks out
# your repo, checks out codekiln/clilint alongside it, sets up Python, and runs
# clilint directly from the checkout (no install required).

name: clilint

on:
  push:
  pull_request:

jobs:
  clilint:
    runs-on: ubuntu-latest
    steps:
      # Check out the repository that contains the CLI you want to lint.
      - name: Checkout
        uses: actions/checkout@v4

      # Check out clilint into a subdirectory so we can run it from source.
      - name: Checkout clilint
        uses: actions/checkout@v4
        with:
          repository: codekiln/clilint
          path: .clilint
          # Pin to a tag or commit for reproducible runs, e.g.:
          # ref: v1.0.0

      # clilint targets Python 3.10+ and has zero third-party dependencies.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Run clilint against your CLI. Adjust the target path and --min-score.
      - name: Run clilint
        run: python .clilint/clilint check ./path/to/your-cli --min-score 90
