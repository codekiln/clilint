# pre-commit hook definitions provided by clilint.
#
# clilint lints an executable target rather than the files that changed in a
# commit, so this hook sets `pass_filenames: false` and expects the target (and
# any other flags) to be supplied by the consumer via `args`. For example:
#
#     args: ["./my-cli", "--min-score", "90"]
#
# clilint must be available on PATH (`language: system`). Install it, or wrap the
# invocation so it resolves to your checkout.

- id: clilint
  name: clilint CLI conformance
  description: Lint a CLI executable for conformance with clilint.
  entry: clilint check
  language: system
  pass_filenames: false
