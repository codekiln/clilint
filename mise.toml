[settings]
# Keep tool resolution reproducible while allowing deliberate version-range updates.
lockfile = true
# Match the user's machine-wide delay for newly published tool versions.
minimum_release_age = "1d"

[tools]
rust = { version = "1.97.0", profile = "default" }
lefthook = "2.1.9"
"npm:@fission-ai/openspec" = "1.6.0"
"npm:rulesync" = "9.6.3"
"npm:skills" = "1.5.16"
release-plz = "0.3.159"
cargo-dist = "0.32.0"

# Install the repository's Git hooks whenever mise enters this trusted checkout.
[hooks]
enter = "lefthook install"
